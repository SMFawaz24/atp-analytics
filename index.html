<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportistics // ATP Tennis H2H Dashboard</title>
<meta name="description" content="ATP tennis head-to-head analyzer — 65,974 matches, 2000–2025.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1b1b1b;
  --text:#e8e8e8;--text2:#9a9a9a;--text3:#555;
  --border:#232323;--border2:#1a1a1a;
  --red:#e03c3a;--blue:#2b7bc8;
  --r:8px;--rl:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
select,button{font-family:inherit}
a{color:var(--text3);text-decoration:none}a:hover{color:var(--text2)}

.shell{max-width:900px;margin:0 auto;padding:2rem 1.25rem 5rem}
.header{display:flex;align-items:baseline;gap:12px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px;color:#fff}
.logo em{color:var(--red);font-style:normal}
.hright{margin-left:auto;font-size:11px;color:var(--text3)}

.selectors{display:grid;grid-template-columns:1fr 36px 1fr;align-items:center;gap:8px;margin-bottom:1.5rem}
.vs{font-size:11px;font-weight:700;color:var(--text3);text-align:center;letter-spacing:1px}
select{width:100%;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;outline:none;transition:border-color .15s}
select:focus{border-color:var(--red)}

.tabs{display:flex;border-bottom:0.5px solid var(--border2);margin-bottom:1.5rem}
.tab{padding:9px 18px;font-size:13px;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;transition:color .12s}
.tab.active{color:var(--text);border-bottom-color:var(--red);font-weight:500}
.tab:hover:not(.active){color:var(--text2)}

.section{display:none}
.section.active{display:block;animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* H2H Banner */
.banner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;background:var(--bg2);border-radius:var(--rl);padding:1.5rem 2rem;margin-bottom:1.25rem;border:0.5px solid var(--border)}
.bp-name{font-size:12px;color:var(--text3);text-align:center;margin-bottom:4px;letter-spacing:.3px}
.bp-n{font-size:48px;font-weight:700;line-height:1;text-align:center;color:var(--text2);letter-spacing:-2px}
.bp-n.lead{color:var(--red)}
.bp-n.behind{color:var(--text3)}
.bmid{text-align:center;font-size:11px;color:var(--text3);line-height:1.8}
.bmid b{display:block;font-size:18px;font-weight:700;color:var(--text2);letter-spacing:-.5px}

/* Filters */
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.fb{padding:5px 12px;font-size:11px;border:0.5px solid var(--border);border-radius:20px;background:none;color:var(--text3);cursor:pointer;transition:all .12s;letter-spacing:.2px}
.fb:hover:not(.on){color:var(--text2);border-color:#333}
.fb.on{background:var(--red);border-color:var(--red);color:#fff}
.fb.surf-on{background:var(--blue);border-color:var(--blue);color:#fff}

/* Match list */
.ml{display:flex;flex-direction:column;gap:4px;max-height:500px;overflow-y:auto;padding-right:3px}
.ml::-webkit-scrollbar{width:3px}
.ml::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.mc{background:var(--bg2);border-radius:var(--r);padding:11px 14px;cursor:pointer;border:0.5px solid var(--border2);transition:border-color .12s}
.mc:hover{border-color:var(--border)}
.mc.open{border-color:var(--red)}
.mc-top{display:flex;align-items:center;gap:10px}
.mc-dt{font-size:11px;color:var(--text3);min-width:70px;font-variant-numeric:tabular-nums;flex-shrink:0}
.mc-tr{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-sc{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
.mc-sc.w1{color:var(--blue)}
.mc-sc.w2{color:var(--red)}
.mc-meta{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.pGS{background:rgba(224,60,58,.13);color:#f07472}
.pF{background:rgba(217,123,44,.13);color:#e09050}
.pM1000{background:rgba(43,123,200,.14);color:#68b0e8}
.pA500{background:rgba(90,171,58,.12);color:#88cc66}
.pA250{background:rgba(80,80,80,.1);color:#777}
.pH{background:rgba(43,123,200,.12);color:#68b0e8}
.pC{background:rgba(90,171,58,.12);color:#88cc66}
.pG{background:rgba(139,125,232,.12);color:#b0a6f0}
.pP{background:rgba(80,80,80,.1);color:#777}
.pCB{background:rgba(217,123,44,.12);color:#e09050}
.pB5{background:rgba(80,80,80,.08);color:#666}
.mc-tv{margin-top:9px;padding:10px 13px;background:var(--bg3);border-radius:6px;font-size:12px;color:var(--text2);line-height:1.65;border-left:2px solid var(--red)}

/* Cards */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem}
.card{background:var(--bg2);border-radius:var(--r);padding:.9rem 1rem;border:0.5px solid var(--border)}
.clabel{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.cval{font-size:26px;font-weight:700;color:#fff}
.cval2{font-size:26px;font-weight:700;color:var(--text3)}
.cval.hi{color:var(--blue)}
.cval2.hi{color:var(--red)}
.cvrow{display:flex;justify-content:space-between;align-items:baseline}
.bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.bf-b{height:100%;border-radius:2px;background:var(--blue)}
.bf-r{height:100%;border-radius:2px;background:var(--red)}
.sub2{font-size:10px;color:var(--text3);margin-top:3px}

/* Conditional */
.cb{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:0.5px solid var(--border);margin-bottom:8px}
.cb-title{font-size:12px;color:var(--text2);margin-bottom:12px;font-weight:500}
.cb-row{display:grid;grid-template-columns:110px 1fr 100px;gap:8px;align-items:center;margin-bottom:8px}
.cn{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpct{font-size:12px;font-weight:600;text-align:right}
.cpct span{font-size:10px;font-weight:400;color:var(--text3)}

.slabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:1.25rem}
.nodata{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.hint{text-align:center;font-size:11px;color:var(--text3);margin-top:1rem}
.footer{text-align:center;margin-top:4rem;font-size:11px;color:var(--text3);line-height:2}

@media(max-width:560px){
  .g5{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .cb-row{grid-template-columns:85px 1fr 85px}
  .bp-n{font-size:36px}
}
</style>
</head>

const SL={GS:'Grand Slam',F:'ATP Finals',M1000:'Masters 1000',A500:'ATP 500',A250:'ATP 250'};
const SUFL={H:'Hard',C:'Clay',G:'Grass',P:'Carpet'};
const RL={R1:'R1',R2:'R2',R3:'R3',R4:'R4',QF:'QF',SF:'SF',F:'Final',RR:'RR'};
const PC={GS:'pGS',F:'pF',M1000:'pM1000',A500:'pA500',A250:'pA250',H:'pH',C:'pC',G:'pG',P:'pP'};
const SCOL={H:'#2b7bc8',C:'#5aab3a',G:'#8b7de8',P:'#888'};
const TN=['GS','F','M1000','A500','A250'];
const TD=['Grand Slam','ATP Finals','Masters 1000','ATP 500','ATP 250'];
const SERIES_SET=new Set(['GS','F','M1000','A500','A250']);
const SURF_SET=new Set(['H','C','G','P']);

let p1='Federer R.',p2='Nadal R.',filt='all',filtType='all',tab='h2h';

function h2hAll(a,b){
  const k1=a+'||'+b,k2=b+'||'+a;
  let arr,fl=false;
  if(DB.h2h[k1])arr=DB.h2h[k1];
  else if(DB.h2h[k2]){arr=DB.h2h[k2];fl=true;}
  else return[];
  return arr.map(m=>{
    const[dt,tr,se,su,rn,bo,pw,sc,ns,c1,c2,tv]=m;
    return{dt,tr,se,su,rn,bo,
      pw:fl?!pw:!!pw,
      sc:fl?sc.split(' ').map(s=>{const[a,b]=s.split('-');return b+'-'+a;}).join(' '):sc,
      ns,c1:fl?c2:c1,c2:fl?c1:c2,tv:tv||''};
  });
}

// FIXED: use Set membership, not string.includes
function applyFilter(arr){
  if(filtType==='all')return arr;
  if(filtType==='series')return arr.filter(m=>m.se===filt);
  if(filtType==='surface')return arr.filter(m=>m.su===filt);
  return arr;
}

function pct(w,t){return t?Math.round(w/t*100):0;}

function renderH2H(){
  const all=h2hAll(p1,p2),ms=applyFilter(all);
  const p1w=ms.filter(m=>m.pw).length,p2w=ms.length-p1w;

  document.getElementById('bn1').textContent=p1;
  document.getElementById('bn2').textContent=p2;
  document.getElementById('bw1').className='bp-n'+(p1w>p2w?' lead':p1w<p2w?' behind':'');
  document.getElementById('bw2').className='bp-n'+(p2w>p1w?' lead':p2w<p1w?' behind':'');
  document.getElementById('bw1').textContent=p1w;
  document.getElementById('bw2').textContent=p2w;
  document.getElementById('bmid').innerHTML='<b>'+ms.length+'</b>matches';

  const ml=document.getElementById('ml');
  if(!ms.length){ml.innerHTML='<div class="nodata">No matches found for this filter.</div>';return;}

  const sorted=[...ms].sort((a,b)=>b.dt.localeCompare(a.dt));
  ml.innerHTML=sorted.map((m,i)=>`
    <div class="mc" id="mc${i}" onclick="tog(${i})">
      <div class="mc-top">
        <span class="mc-dt">${m.dt.slice(0,7)}</span>
        <span class="mc-tr">${m.tr}</span>
        <span class="mc-sc ${m.pw?'w1':'w2'}">${m.sc||'–'}</span>
      </div>
      <div class="mc-meta">
        <span class="pill ${PC[m.se]||''}">${SL[m.se]||m.se}</span>
        <span class="pill ${PC[m.su]||''}">${SUFL[m.su]||m.su}</span>
        <span class="pill pA250">${RL[m.rn]||m.rn}</span>
        ${m.c1||m.c2?'<span class="pill pCB">Comeback</span>':''}
        ${m.bo===5?'<span class="pill pB5">Best of 5</span>':''}
      </div>
      <div class="mc-tv" id="tv${i}" style="display:none">${m.tv||(m.tr+' — '+(SUFL[m.su]||m.su)+'.')}</div>
    </div>`).join('');
}

window.tog=function(i){
  const tv=document.getElementById('tv'+i),mc=document.getElementById('mc'+i);
  const open=tv.style.display!=='none';
  document.querySelectorAll('.mc-tv').forEach(e=>e.style.display='none');
  document.querySelectorAll('.mc').forEach(e=>e.classList.remove('open'));
  if(!open){tv.style.display='block';mc.classList.add('open');}
};

function renderTitles(){
  const t1=DB.titles[p1]||[0,0,0,0,0],t2=DB.titles[p2]||[0,0,0,0,0];
  document.getElementById('tg').innerHTML=TN.map((k,i)=>{
    const v1=t1[i],v2=t2[i];
    return`<div class="card">
      <div class="clabel">${TD[i]}</div>
      <div class="cvrow">
        <span class="cval${v1>v2?' hi':''}">${v1}</span>
        <span class="cval2${v2>v1?' hi':''}">${v2}</span>
      </div>
    </div>`;
  }).join('');

  const all=h2hAll(p1,p2);
  const rows=[...TN,'H','C','G','P'].map(s=>{
    const isSurf=SURF_SET.has(s);
    const sm=isSurf?all.filter(m=>m.su===s):all.filter(m=>m.se===s);
    if(!sm.length)return'';
    const w=sm.filter(m=>m.pw).length,l=sm.length-w;
    const lbl=isSurf?SUFL[s]:SL[s];
    return`<div class="card" style="margin-bottom:8px">
      <div class="clabel">${lbl} (${sm.length} matches)</div>
      <div class="cvrow" style="margin-bottom:6px">
        <span style="font-size:13px">${p1.split(' ')[0]}&nbsp;<strong style="color:var(--blue)">${w}</strong></span>
        <span style="font-size:13px">${p2.split(' ')[0]}&nbsp;<strong style="color:var(--red)">${l}</strong></span>
      </div>
      <div class="bar"><div class="bf-b" style="width:${w/sm.length*100}%"></div></div>
    </div>`;
  }).filter(Boolean);
  document.getElementById('th2h').innerHTML=rows.length?
    '<div class="slabel">H2H breakdown — all categories</div>'+rows.join(''):'';
}

function renderSurface(){
  const s1=DB.surface[p1]||{},s2=DB.surface[p2]||{};
  const all=h2hAll(p1,p2);

  // Career win% — all 4 surfaces
  document.getElementById('sc').innerHTML=['H','C','G','P'].map(s=>{
    const d1=s1[s]||[0,0],d2=s2[s]||[0,0];
    const pp1=pct(d1[0],d1[0]+d1[1]),pp2=pct(d2[0],d2[0]+d2[1]);
    const col=SCOL[s];
    return`<div class="card">
      <div class="clabel">${SUFL[s]}</div>
      <div class="cvrow">
        <div>
          <div style="font-size:22px;font-weight:700;${pp1>pp2?'color:'+col:''}">${pp1}%</div>
          <div class="sub2">${p1.split(' ')[0]}: ${d1[0]}W–${d1[1]}L</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:700;${pp2>pp1?'color:'+col:'color:var(--text3)'}">${pp2}%</div>
          <div class="sub2" style="text-align:right">${p2.split(' ')[0]}: ${d2[0]}W–${d2[1]}L</div>
        </div>
      </div>
      <div class="bar" style="margin-top:10px"><div style="height:100%;border-radius:2px;background:${col};width:${pp1}%"></div></div>
    </div>`;
  }).join('');

  // H2H by surface
  const surfCards=['H','C','G','P'].map(s=>{
    const sm=all.filter(m=>m.su===s);
    if(!sm.length)return'';
    const w=sm.filter(m=>m.pw).length,l=sm.length-w;
    return`<div class="card">
      <div class="clabel">${SUFL[s]} — ${sm.length} match${sm.length>1?'es':''}</div>
      <div class="cvrow">
        <span class="cval${w>l?' hi':''}">${w}</span>
        <span class="cval2${l>w?' hi':''}">${l}</span>
      </div>
      <div class="bar"><div class="bf-b" style="width:${w/sm.length*100}%"></div></div>
    </div>`;
  }).filter(Boolean);
  document.getElementById('sh').innerHTML=surfCards.length?surfCards.join(''):'<div class="nodata" style="grid-column:1/-1">No H2H data yet</div>';

  // H2H by level
  const lvlCards=TN.map(s=>{
    const sm=all.filter(m=>m.se===s);
    if(!sm.length)return'';
    const w=sm.filter(m=>m.pw).length,l=sm.length-w;
    return`<div class="card">
      <div class="clabel">${SL[s]} — ${sm.length}</div>
      <div class="cvrow">
        <span class="cval${w>l?' hi':''}">${w}</span>
        <span class="cval2${l>w?' hi':''}">${l}</span>
      </div>
      <div class="bar"><div class="bf-b" style="width:${w/sm.length*100}%"></div></div>
    </div>`;
  }).filter(Boolean);
  document.getElementById('sl').innerHTML=lvlCards.length?lvlCards.join(''):'<div class="nodata" style="grid-column:1/-1">No H2H data</div>';
}

function renderConditional(){
  const c1=DB.cond[p1],c2=DB.cond[p2];
  if(!c1||!c2){document.getElementById('cblocks').innerHTML='<div class="nodata">No data</div>';return;}
  const p1s=p1.split(' ')[0],p2s=p2.split(' ')[0];
  // [cb_opp,cb_won,lead_opp,lead_won,won1_w,won1_t,lost1_w,lost1_t]
  const stats=[
    {lbl:'Win rate after winning 1st set',p1:[c1[4],c1[5]],p2:[c2[4],c2[5]]},
    {lbl:'Win rate after losing 1st set',p1:[c1[6],c1[7]],p2:[c2[6],c2[7]]},
    {lbl:'Comeback from 0–2 down in sets (5-setters)',p1:[c1[1],c1[0]],p2:[c2[1],c2[0]]},
    {lbl:'Closing out a 2–0 sets lead (5-setters)',p1:[c1[3],c1[2]],p2:[c2[3],c2[2]]},
  ];

    const pp1=pct(st.p1[0],st.p1[1]),pp2=pct(st.p2[0],st.p2[1]);
    const mx=Math.max(pp1,pp2,1);
    return`<div class="cb">
      <div class="cb-title">${st.lbl}</div>
      <div class="cb-row" style="margin-bottom:9px">
        <span class="cn">${p1s}</span>
        <div class="bar"><div class="bf-b" style="width:${pp1/mx*100}%"></div></div>
        <span class="cpct" style="${pp1>pp2?'color:var(--blue)':''}">${pp1}%<span> (${st.p1[0]}/${st.p1[1]})</span></span>
      </div>
      <div class="cb-row">
        <span class="cn">${p2s}</span>
        <div class="bar"><div class="bf-r" style="width:${pp2/mx*100}%"></div></div>
        <span class="cpct" style="${pp2>pp1?'color:var(--red)':''}">${pp2}%<span> (${st.p2[0]}/${st.p2[1]})</span></span>
      </div>
    </div>`;
  }).join('');
}

function render(){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='h2h')renderH2H();
  else if(tab==='titles')renderTitles();
  else if(tab==='surface')renderSurface();
  else if(tab==='conditional')renderConditional();
}

// Init
const players=DB.players;
['p1sel','p2sel'].forEach((id,idx)=>{
  const def=idx===0?p1:p2;
  document.getElementById(id).innerHTML=players.map(pl=>`<option value="${pl}"${pl===def?' selected':''}>${pl}</option>`).join('');
});
document.getElementById('p1sel').addEventListener('change',e=>{
  p1=e.target.value;if(p1===p2){p2=players.find(x=>x!==p1);document.getElementById('p2sel').value=p2;}render();
});
document.getElementById('p2sel').addEventListener('change',e=>{
  p2=e.target.value;if(p2===p1){p1=players.find(x=>x!==p2);document.getElementById('p1sel').value=p1;}render();
});
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');tab=t.dataset.tab;render();
}));
document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.fb');if(!b)return;
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on','surf-on'));
  filt=b.dataset.f;
  filtType=b.dataset.type;
  b.classList.add(filtType==='surface'?'surf-on':'on');
  renderH2H();
});
render();
</script>
</body>
</html>
